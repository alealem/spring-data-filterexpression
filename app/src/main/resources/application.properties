spring.application.name=demo
app.db.host=${DB_HOST:localhost}
app.db.port=${DB_PORT:5454}
app.db.name=${DB_NAME:postgres}
app.db.schema=${DB_SCHEMA:demo}
# --- DataSource ---
spring.datasource.url=jdbc:postgresql://${app.db.host}:${app.db.port}/${app.db.name}?currentSchema=${app.db.schema}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=${app.db.schema}


# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=${app.db.schema}
spring.flyway.schemas=${app.db.schema}
spring.flyway.create-schemas=true
spring.flyway.baseline-on-migrate=true

logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG

spring.jackson.deserialization.fail-on-unknown-properties=true
